spring.application.name=backend

# ============================================================
# MySQL Database Configuration
# ============================================================
# 需要先创建数据库: CREATE DATABASE smart_light DEFAULT CHARSET utf8mb4;
# 然后执行: src/main/resources/sql/schema.sql 和 seed-data.sql
spring.datasource.url=jdbc:mysql://localhost:3306/smart_light?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_password_here
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# MyBatis-Plus Configuration
# ============================================================
mybatis-plus.mapper-locations=classpath*:/mapper/**/*.xml
mybatis-plus.type-aliases-package=com.smartlight.backend.entity

# ============================================================
# Server Configuration
# ============================================================
server.port=8080

# ============================================================
# MQTT Configuration（可选，默认关闭）
# ============================================================
mqtt.broker-url=tcp://localhost:1883
mqtt.client-id=smart-light-backend-001
mqtt.topic-prefix=smartlight/
mqtt.enabled=false
mqtt.qos=1

# ============================================================
# Alert Check Configuration
# ============================================================
alert.check.interval=60000
alert.check.initial-delay=30000
alert.dedup.minutes=30
# 告警推送合并周期（秒），窗口内多条告警合并为一条推送
alert.push.interval=5

# ============================================================
# Alert Email Configuration（可选）
# ============================================================
# 邮件API平台: https://luckycola.com.cn/tools/customMail
# 使用步骤:
#   1. 在 https://luckycola.com.cn 注册账号，获取 ColaKey
#   2. 在邮箱设置中开启 SMTP 服务，获取授权码（smtp-code）
#   3. smtp-code-type 可选: qq / 163 / 126
alert.email.cola-key=your-cola-key
alert.email.smtp-email=your-email
alert.email.smtp-code=your-smtp-code
alert.email.smtp-code-type=qq

# ============================================================
# AI Agent Configuration（DeepSeek / OpenAI 兼容协议）
# ============================================================
# 使用 DeepSeek 官方 API: https://platform.deepseek.com
# 获取 API Key: https://platform.deepseek.com/api_keys
# 也支持其他 OpenAI 兼容接口，修改 base-url 即可
#   - DeepSeek:  https://api.deepseek.com/v1
#   - OpenAI:    https://api.openai.com/v1
#   - 其他兼容:   替换为对应地址
ai.agent.api-key=sk-your-api-key-here
ai.agent.base-url=https://api.deepseek.com/v1
ai.agent.model=deepseek-chat
ai.agent.system-prompt=你是智慧路灯管理系统的AI运维助手。你可以查询路灯状态、控制路灯开关和亮度、查看传感器数据、查询报警信息、搜索知识库。回答要简洁专业，数据来自系统实时查询。

# ============================================================
# Redis Configuration（可选，推荐开启以提升性能）
# ============================================================
# 引入 Redis 后，传感器数据写入变为先写Redis再异步批量落MySQL，
# 实时监控页面从Redis读取最新数据，大幅降低MySQL压力。
# 如果 Redis 未启动，系统自动降级为直接读写 MySQL，不影响功能。
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.connect-timeout=2000
spring.data.redis.lettuce.pool.max-active=16
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=4
# Allow circular references (MqttConfig - SensorDataIngestService cycle)
spring.main.allow-circular-references=true
