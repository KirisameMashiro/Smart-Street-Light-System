[mysql]
host = localhost
port = 3306
user = root
password = your_password_here
database = smart_light
charset = utf8mb4

[mqtt]
broker = localhost
port = 1883
keepalive = 60
client_id = sensor_simulator
# 如果 MQTT 需要认证，取消注释并填写
# username =
# password =

[simulator]
# 发布间隔范围（秒），脚本会在此范围内随机取值
interval_min = 3
interval_max = 5

[backend]
# 后端 API 地址（启动时获取路灯列表，代替直连数据库）
api_url = http://localhost:8080